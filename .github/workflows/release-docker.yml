name: Release Docker Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example v0.0.1"
        required: true
        default: "v0.0.1"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          owner_repo="${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "server=ghcr.io/${owner_repo}-server" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${owner_repo}-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.server
          push: true
          tags: |
            ${{ steps.images.outputs.server }}:${{ steps.images.outputs.version }}
            ${{ steps.images.outputs.server }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: true
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL }}
          tags: |
            ${{ steps.images.outputs.web }}:${{ steps.images.outputs.version }}
            ${{ steps.images.outputs.web }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
