services:
  server:
    image: ${SERVER_IMAGE}
    restart: unless-stopped
    environment:
      PORT: "2567"
    ports:
      - "${SERVER_PORT:-2567}:2567"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const r = await fetch('http://127.0.0.1:2567/health'); process.exit(r.ok ? 0 : 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
