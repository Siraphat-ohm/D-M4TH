services:
  server:
    image: ${SERVER_IMAGE:?set SERVER_IMAGE in .env}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "2567"
    expose:
      - "2567"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const r = await fetch('http://127.0.0.1:2567/health'); process.exit(r.ok ? 0 : 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${WEB_IMAGE:?set WEB_IMAGE in .env}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
